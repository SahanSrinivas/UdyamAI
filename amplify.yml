version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Forward Amplify Console env vars to Next.js SSR runtime.
        # Amplify Console env vars are available during build but don't auto-flow
        # to SSR Lambda functions. Writing them to .env.production makes Next.js
        # pick them up at runtime.
        - |
          for var in DATABASE_URL GOOGLE_API_KEY GEMINI_API_KEY; do
            if [ -n "${!var:-}" ]; then
              echo "${var}=${!var}" >> .env.production
              echo "  ✓ Forwarded ${var}"
            else
              echo "  · ${var} not set at build time"
            fi
          done
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - .next/cache/**/*
